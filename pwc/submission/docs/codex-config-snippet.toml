# trusted-ceo-agent — Codex MCP 도구 승인 설정
# ~/.codex/config.toml 끝에 이 블록을 그대로 붙여넣으세요.
# 플러그인 id 의 @뒤(마켓플레이스명)는 설치한 마켓플레이스에 맞게 바꿉니다
# (submission 자체 마켓플레이스면 trusted-ceo-agent-market, 이 저장소 루트 마켓플레이스면 lemuel-copilots).
# 모든 도구가 읽기 전용 조회이므로 approve 가 안전합니다.
# 비대화 codex exec 에서는 이 설정이 없으면 MCP 호출이 자동 취소됩니다 — 실측 확인.

[plugins."trusted-ceo-agent@trusted-ceo-agent-market".mcp_servers.trusted-ceo-agent-dart]
enabled = true
default_tools_approval_mode = "approve"

[plugins."trusted-ceo-agent@trusted-ceo-agent-market".mcp_servers.trusted-ceo-agent-ecos]
enabled = true
default_tools_approval_mode = "approve"

[plugins."trusted-ceo-agent@trusted-ceo-agent-market".mcp_servers.trusted-ceo-agent-news]
enabled = true
default_tools_approval_mode = "approve"

[plugins."trusted-ceo-agent@trusted-ceo-agent-market".mcp_servers.trusted-ceo-agent-registry]
enabled = true
default_tools_approval_mode = "approve"
