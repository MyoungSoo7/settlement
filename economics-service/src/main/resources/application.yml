spring:
  profiles:
    active: local

  application:
    name: lemuel-economics

  threads:
    virtual:
      enabled: true

  # ★ economics-service 는 자체 DB(lemuel_economics) 를 소유한다 (DB-per-service).
  #   공개 read-only 조회 서비스 — 다른 서비스와 코드·DB·이벤트 의존 없음.
  datasource:
    url: jdbc:postgresql://localhost:5440/lemuel_economics?reWriteBatchedInserts=true
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: lemuel-economics-pool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 10000
      idle-timeout: 600000      # 10분
      max-lifetime: 1800000     # 30분
      keepalive-time: 300000    # 5분

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=600s

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8087
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  economics:
    # /admin/economics/** 게이트 공유 시크릿 — 미설정 시 통과+경고 (로컬 전용, 운영 필수)
    internal-api-key: ${ECONOMICS_INTERNAL_API_KEY:}
    ecos:
      # ecos.bok.or.kr 발급 인증키 — 미설정이면 수집 비활성(Flyway 시드 데이터로만 동작)
      api-key: ${ECOS_API_KEY:}
      base-url: https://ecos.bok.or.kr/api
    sync:
      request-interval-ms: 150   # ECOS 쿼터 보호용 호출 간격
      schedule:
        cron: "0 0 8 * * *"      # 매일 08:00 KST 전체 지표 자동 수집
        zone: Asia/Seoul
        lookback-days: 30        # 최근 30일 재조회 (SEED → 실 ECOS 값으로 덮어씀)
