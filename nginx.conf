events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 로그인/비밀번호 재설정 무차별 대입 공격 방지
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # 일반 API 과부하 방지
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # ── 보안 헤더 ─────────────────────────────────────────────────────────
        # Clickjacking 방지
        add_header X-Frame-Options "SAMEORIGIN" always;
        # MIME 타입 스니핑 방지
        add_header X-Content-Type-Options "nosniff" always;
        # XSS 필터 (구형 브라우저 대응)
        add_header X-XSS-Protection "1; mode=block" always;
        # 리퍼러 정보 최소화
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # 불필요한 브라우저 기능 비활성화
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP: 인라인 스크립트는 React 빌드에서 사용되므로 'unsafe-inline' 허용
        # 운영 환경에서는 nonce 기반으로 강화 권장
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'self'" always;
        # HSTS: HTTPS 전환 후 활성화 (현재 HTTP 환경이면 주석 처리)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # nginx 버전 정보 숨김
        server_tokens off;

        # Frontend (React build)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Backend API — 일반 rate limit 적용
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth API — 엄격한 rate limit (로그인 무차별 대입 방지)
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Users API — 비밀번호 재설정에 rate limit 적용
        location /users/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static Assets (Images)
        location /assets/ {
            alias /data/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Actuator — K8s 내부 헬스체크는 허용, 외부에서는 차단
        # 운영 환경에서 nginx가 public-facing인 경우 prometheus 등 민감 엔드포인트 보호
        location /actuator/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /actuator/ {
            # 내부 네트워크(K8s pod CIDR 등)에서만 허용
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}