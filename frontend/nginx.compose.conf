# docker-compose 전용 nginx conf (k8s 이미지는 nginx.conf 를 사용).
# 정적 proxy_pass 는 nginx 기동 시 DNS 를 1회만 해석해 캐시하므로, gateway 컨테이너가
# 재생성돼 IP 가 바뀌면 stale IP 로 계속 프록시해 로그인 등 전 API 가 500 이 된다
# (실제 발생 — 전체 재빌드 후 frontend 만 유지된 상황). 도커 내장 DNS(127.0.0.11) 를
# resolver 로 지정하고 변수 proxy_pass 를 써서 요청마다 재해석하게 한다.
# k8s 는 Service ClusterIP 가 파드 재시작에도 고정이라 이 문제가 없다.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Backend proxy ──────────────────────────────────────────────────────
    # 모든 REST API 엔드포인트는 gateway-service 로 프록시.
    # SPA fallback 보다 먼저 매칭되어야 함.
    # 변수를 쓰면 nginx 가 proxy_pass 호스트를 매 요청 resolver 로 재해석한다 (stale IP 방지).
    # ⚠️ /admin 은 프론트 SPA 라우트(/admin/system/*, /admin/operation, /admin/ceo/*, /admin/settlement 등)와
    #    프리픽스를 공유한다. 백엔드 admin API 를 allowlist 로 열거하면 신규 API(menus/common-codes/rbac/market…)
    #    가 늘 때마다 누락돼 깨지므로, 반대로 처리한다: 프론트 SPA admin 라우트만 index.html 로 예외 폴백하고
    #    (아래 별도 location), 나머지 /admin/* 는 전부 gateway 로 프록시한다 (딥링크/F5 새로고침도 정상).
    # ai-service 챗봇 SSE 스트리밍 — 버퍼링을 끄지 않으면 delta 이벤트가 묶여서 도착한다.
    # ^~ 프리픽스 매칭은 아래 regex 매칭보다 우선한다.
    location ^~ /api/ai/ {
        set $gateway_upstream gateway-service:8080;
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;   # LLM 응답 생성이 60s 를 넘을 수 있다
    }

    # market-stream 실시간 시세 SSE — 버퍼링을 끄지 않으면 틱이 묶여서 도착한다.
    # 장기 연결이므로 read timeout 을 넉넉히 (틱 1s 간격이라 사실상 무제한과 동일).
    location ^~ /api/market-stream/ {
        set $gateway_upstream gateway-service:8080;
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # 프론트 SPA admin 라우트만 index.html 로 폴백 — 아래 백엔드 /admin 프록시보다 먼저 매칭.
    # (system|operation|ceo|settlement|login) 및 /admin 단독만 SPA, 그 외 /admin/* 는 전부 프록시.
    location ~ ^/admin(/(system|operation|ceo|settlement|login)(/|$)|/?$) {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    location ~ ^/(auth|api|admin|users|orders|payments|reviews|settlements|loans|categories|coupons|games|products|tags|refunds|chargebacks|ledger|actuator|swagger-ui|v3/api-docs)(/|$) {
        set $gateway_upstream gateway-service:8080;
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing - serve index.html for all routes
    # index.html 은 절대 캐시하지 않는다 — 새 빌드(해시된 청크) 참조를 즉시 반영하기 위함.
    # (해시 에셋은 immutable 캐시, HTML 만 항상 재검증)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (nginx 자체 헬스 — K8s probe용)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
