# docker-compose 전용 nginx conf (k8s 이미지는 nginx.conf 를 사용).
# 정적 proxy_pass 는 nginx 기동 시 DNS 를 1회만 해석해 캐시하므로, gateway 컨테이너가
# 재생성돼 IP 가 바뀌면 stale IP 로 계속 프록시해 로그인 등 전 API 가 500 이 된다
# (실제 발생 — 전체 재빌드 후 frontend 만 유지된 상황). 도커 내장 DNS(127.0.0.11) 를
# resolver 로 지정하고 변수 proxy_pass 를 써서 요청마다 재해석하게 한다.
# k8s 는 Service ClusterIP 가 파드 재시작에도 고정이라 이 문제가 없다.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Backend proxy ──────────────────────────────────────────────────────
    # 모든 REST API 엔드포인트는 gateway-service 로 프록시.
    # SPA fallback 보다 먼저 매칭되어야 함.
    # 변수를 쓰면 nginx 가 proxy_pass 호스트를 매 요청 resolver 로 재해석한다 (stale IP 방지).
    # ⚠️ /admin 은 프론트 SPA 라우트(/admin/system/*, /admin/operation, /admin/ceo/*, /admin/settlement 등)와
    #    프리픽스를 공유하므로 통짜 매칭하면 안 된다. 실제 백엔드 admin API 서브패스만 명시적으로 프록시하고,
    #    나머지 /admin/* 는 아래 SPA fallback(try_files → index.html)으로 흘려보낸다 (딥링크/F5 새로고침 정상화).
    location ~ ^/(auth|api|admin/(categories|products|pg-reconciliation|pg|settlement-projection|reconciliation|financial|economics|company|chargebacks|dlq|payouts)|users|orders|payments|reviews|settlements|loans|categories|coupons|games|products|tags|refunds|chargebacks|ledger|actuator|swagger-ui|v3/api-docs)(/|$) {
        set $gateway_upstream gateway-service:8080;
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing - serve index.html for all routes
    # index.html 은 절대 캐시하지 않는다 — 새 빌드(해시된 청크) 참조를 즉시 반영하기 위함.
    # (해시 에셋은 immutable 캐시, HTML 만 항상 재검증)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (nginx 자체 헬스 — K8s probe용)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
