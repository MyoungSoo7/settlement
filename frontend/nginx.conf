server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Backend proxy ──────────────────────────────────────────────────────
    # 모든 REST API 엔드포인트는 백엔드 Service(settlement-app:8080)로 프록시.
    # SPA fallback 보다 먼저 매칭되어야 함.
    # NOTE: prod 의 Helm chart Service 이름이 settlement-app. staging 은 settlement-staging-app 라
    #   기본값은 prod 기준. 필요 시 Dockerfile envsubst 로 분기.
    location ~ ^/(auth|api|admin|users|orders|payments|reviews|settlements|categories|coupons|games|products|tags|refunds|chargebacks|ledger|actuator|swagger-ui|v3/api-docs)(/|$) {
        proxy_pass http://settlement-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (nginx 자체 헬스 — K8s probe용)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
