server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Backend proxy ──────────────────────────────────────────────────────
    # 모든 REST API 엔드포인트는 백엔드 Service(settlement-app:8080)로 프록시.
    # SPA fallback 보다 먼저 매칭되어야 함.
    # ⚠️ /admin 은 프론트 SPA 라우트(/admin/system/*, /admin/operation, /admin/ceo/*, /admin/settlement 등)와
    #    프리픽스를 공유한다. 백엔드 admin API 를 allowlist 로 열거하면 신규 API(menus/common-codes/rbac/market…)
    #    가 늘 때마다 누락돼 깨지므로, 반대로 처리한다: 프론트 SPA admin 라우트만 index.html 로 예외 폴백하고
    #    (아래 별도 location), 나머지 /admin/* 는 전부 gateway 로 프록시한다 (딥링크/F5 새로고침도 정상).
    location ~ ^/admin(/(system|operation|ceo|settlement|login)(/|$)|/?$) {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # market-stream 실시간 시세 SSE — 버퍼링을 끄지 않으면 틱이 묶여서 도착한다. 장기 연결 허용.
    location ^~ /api/market-stream/ {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location ~ ^/(auth|api|admin|users|orders|payments|reviews|settlements|loans|categories|coupons|games|products|tags|refunds|chargebacks|ledger|actuator|swagger-ui|v3/api-docs)(/|$) {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing - serve index.html for all routes
    # index.html 은 절대 캐시하지 않는다 — 새 빌드(해시된 청크) 참조를 즉시 반영하기 위함.
    # (해시 에셋은 immutable 캐시, HTML 만 항상 재검증)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (nginx 자체 헬스 — K8s probe용)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
