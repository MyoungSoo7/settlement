services:
  postgres:
    image: postgres:17-alpine
    container_name: lemuel-postgres
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: inter
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ★ DB-per-service: reservation-service 전용 PostgreSQL (opslab 와 물리 분리)
  reservations-postgres:
    image: postgres:17-alpine
    container_name: lemuel-reservations-db
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: reservations_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - reservations-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ★ DB-per-service: settlement-service 전용 PostgreSQL (opslab 와 물리 분리, ADR 0020 Phase 4)
  settlement-db:
    image: postgres:17-alpine
    container_name: lemuel-settlement-db
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: settlement_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - settlement-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ★ DB-per-service: loan-service 전용 PostgreSQL (opslab 와 물리 분리)
  loan-postgres:
    image: postgres:17-alpine
    container_name: lemuel-loan-db
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: lemuel_loan
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - loan-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: lemuel-elasticsearch
    env_file:
      - path: .env
        required: false
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u $$ELASTICSEARCH_USER:$$ELASTICSEARCH_PASSWORD http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: lemuel-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:18082
      - --advertise-pandaproxy-addr localhost:18082
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:29092:29092"
      - "127.0.0.1:18082:18082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: lemuel-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # PgBouncer — 트랜잭션 풀링. 가상 스레드가 켜져 있어 앱은 수많은 커넥션을 원하지만
  # PostgreSQL max_connections 는 100 이 한계. PgBouncer 가 많은 앱 커넥션을 적은 PG 백엔드로
  # 멀티플렉싱해 동시 처리량(TPS)을 끌어올린다. 앱은 postgres:5432 대신 pgbouncer:6432 로 접속.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: lemuel-pgbouncer
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: inter
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LISTEN_PORT: "6432"                 # pgbouncer 리슨 포트를 6432 로 (기본 5432). 매핑·헬스체크·앱 접속(pgbouncer:6432)과 일치
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction              # 트랜잭션 단위로 백엔드 커넥션 반납 → 멀티플렉싱
      MAX_CLIENT_CONN: "1000"             # 앱 측 동시 커넥션 상한 (가상 스레드 대응)
      DEFAULT_POOL_SIZE: "25"             # PG 로 나가는 실제 백엔드 커넥션 수 (서비스당)
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "127.0.0.1:6432:6432"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U $$DB_USER -d $$DB_NAME || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  order-service:
    build:
      context: .
      args:
        MODULE: order-service
    image: ghcr.io/myoungsoo7/lemuel-order:latest
    container_name: lemuel-order
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # PgBouncer(transaction pooling) 경유. prepareThreshold=0 → 서버사이드 prepared statement 비활성
      # (transaction 풀링 호환). reWriteBatchedInserts=true → JDBC 배치 INSERT 단일 문장 재작성(처리량↑).
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:6432/inter?prepareThreshold=0&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_MAX: "50"                   # PgBouncer 가 흡수하므로 앱 풀을 넉넉히
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      CART_STORE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
      APP_CACHE_TWO_TIER_ENABLED: "true"   # L1 Caffeine + L2 Redis (공유 캐시 + Pub/Sub 무효화)
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8088:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  settlement-service:
    build:
      context: .
      args:
        MODULE: settlement-service
    image: ghcr.io/myoungsoo7/lemuel-settlement:latest
    container_name: lemuel-settlement
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # ADR 0020 Phase 4 — 자체 DB(settlement_db). opslab 와 물리 분리, 자체 Flyway 가 스키마 생성.
      SPRING_DATASOURCE_URL: jdbc:postgresql://settlement-db:5432/settlement_db?reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_MAX: "50"
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USER}
      SPRING_ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      APP_SEARCH_ENABLED: "true"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8082:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      settlement-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  reservation-service:
    build:
      context: .
      args:
        MODULE: reservation-service
    image: ghcr.io/myoungsoo7/lemuel-reservation:latest
    container_name: lemuel-reservation
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 자체 DB(reservations_db) — opslab 와 물리 분리. 교차 FK 없음.
      RESERVATION_DATASOURCE_URL: jdbc:postgresql://reservations-postgres:5432/reservations_db?reWriteBatchedInserts=true
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      # JWT 시크릿은 order-service 와 동일해야 토큰 검증 가능
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8083:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      reservations-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  loan-service:
    build:
      context: .
      args:
        MODULE: loan-service
    image: ghcr.io/myoungsoo7/lemuel-loan:latest
    container_name: lemuel-loan
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 자체 DB(lemuel_loan) — opslab 와 물리 분리. 정산 데이터는 Kafka 이벤트로만 수신.
      SPRING_DATASOURCE_URL: jdbc:postgresql://loan-postgres:5432/lemuel_loan?reWriteBatchedInserts=true
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      # JWT 시크릿은 order-service 와 동일해야 토큰 검증 가능
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8084:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      loan-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  reservation-service:
    build:
      context: .
      args:
        MODULE: reservation-service
    image: ghcr.io/myoungsoo7/lemuel-reservation:latest
    container_name: lemuel-reservation
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 자체 DB(reservations_db) — opslab 와 물리 분리. 교차 FK 없음.
      RESERVATION_DATASOURCE_URL: jdbc:postgresql://reservations-postgres:5432/reservations_db?reWriteBatchedInserts=true
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      # JWT 시크릿은 order-service 와 동일해야 토큰 검증 가능
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8083:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      reservations-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  loan-service:
    build:
      context: .
      args:
        MODULE: loan-service
    image: ghcr.io/myoungsoo7/lemuel-loan:latest
    container_name: lemuel-loan
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 자체 DB(lemuel_loan) — opslab 와 물리 분리. 정산 데이터는 Kafka 이벤트로만 수신.
      SPRING_DATASOURCE_URL: jdbc:postgresql://loan-postgres:5432/lemuel_loan?reWriteBatchedInserts=true
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      # JWT 시크릿은 order-service 와 동일해야 토큰 검증 가능
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "127.0.0.1:8084:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      loan-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      args:
        MODULE: gateway-service
    image: ghcr.io/myoungsoo7/lemuel-gateway:latest
    container_name: lemuel-gateway
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ORDER_SERVICE_URI: http://order-service:8080
      SETTLEMENT_SERVICE_URI: http://settlement-service:8080
      RESERVATION_SERVICE_URI: http://reservation-service:8080
      LOAN_SERVICE_URI: http://loan-service:8080
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      order-service:
        condition: service_healthy

  frontend:
    image: nginx:1.25-alpine
    container_name: lemuel-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    depends_on:
      - gateway-service

  prometheus:
    image: prom/prometheus:latest
    container_name: lemuel-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # 분산 트레이싱 백엔드 — OTLP 수신 → Tempo 저장 → Grafana 에서 trace 검색.
  # order-service / settlement-service 가 OTEL_EXPORTER_OTLP_ENDPOINT 로 발행.
  tempo:
    image: grafana/tempo:2.5.0
    container_name: lemuel-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"   # Tempo HTTP query API
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: lemuel-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  postgres-data:
  reservations-postgres-data:
  settlement-db-data:
  loan-postgres-data:
  elasticsearch-data:
  redpanda-data:
  redis-data:
  tempo-data:
  grafana-data:
