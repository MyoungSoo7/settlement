spring:
  application:
    name: reservation-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${RESERVATION_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservations_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: lemuel-reservation-pool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: reservation

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: reservation
    default-schema: reservation
    create-schemas: true
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: lemuel-reservation
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        isolation.level: read_committed
    listener:
      ack-mode: manual_immediate
      missing-topics-fatal: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true

# JWT — shared-common JwtProperties(prefix=app.jwt). order-service 와 동일 시크릿이어야 토큰 검증 가능.
app:
  jwt:
    issuer: ${JWT_ISSUER:lemuel}
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
    consumer:
      concurrency: ${APP_KAFKA_CONSUMER_CONCURRENCY:3}
    topic:
      # KafkaOutboxPublisher 컨벤션: aggregate=User + eventType=UserMembershipChanged → lemuel.user.membership_changed
      user-membership-changed: ${APP_KAFKA_TOPIC_USER_MEMBERSHIP_CHANGED:lemuel.user.membership_changed}
