# musinsa-fashion-first — Codex MCP 도구 승인 설정
# ~/.codex/config.toml 끝에 이 블록을 그대로 붙여넣으세요.
# (모든 도구가 읽기 전용 조회이므로 approve 가 안전합니다.
#  비대화 codex exec 에서는 이 설정이 없으면 MCP 호출이 자동 취소됩니다 — 실측 확인)

[plugins."musinsa-fashion-first@musinsa-fashion-first-market".mcp_servers.fashion-first-shop]
enabled = true
default_tools_approval_mode = "approve"

[plugins."musinsa-fashion-first@musinsa-fashion-first-market".mcp_servers.fashion-first-trend]
enabled = true
default_tools_approval_mode = "approve"

[plugins."musinsa-fashion-first@musinsa-fashion-first-market".mcp_servers.fashion-first-news]
enabled = true
default_tools_approval_mode = "approve"

[plugins."musinsa-fashion-first@musinsa-fashion-first-market".mcp_servers.fashion-first-weather]
enabled = true
default_tools_approval_mode = "approve"
