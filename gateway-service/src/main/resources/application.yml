spring:
  application:
    name: lemuel-gateway

  cloud:
    gateway:
      routes:
        - id: order-service-orders
          uri: ${ORDER_SERVICE_URI:http://localhost:8088}
          predicates:
            - Path=/api/orders/**,/api/payments/**,/api/refunds/**,/api/products/**,/api/categories/**,/api/coupons/**,/api/reviews/**,/api/users/**,/api/auth/**
        - id: settlement-service
          uri: ${SETTLEMENT_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/settlements/**,/api/reconciliation/**,/api/reports/**

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
