spring:
  application:
    name: lemuel-gateway

  main:
    # shared-common 이 jakarta.servlet-api 등 servlet 스택을 transitive 로 끌고 오므로
    # Spring 자동 감지가 SERVLET 으로 흐른다. Gateway 는 WebFlux 기반이므로 강제 지정.
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service-orders
              uri: ${ORDER_SERVICE_URI:http://localhost:8088}
              predicates:
                - Path=/api/orders/**,/api/payments/**,/api/refunds/**,/api/products/**,/api/categories/**,/api/coupons/**,/api/reviews/**,/api/users/**,/api/auth/**
            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/settlements/**,/api/reconciliation/**,/api/reports/**

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
