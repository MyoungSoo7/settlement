spring:
  application:
    name: lemuel-gateway

  main:
    # Gateway 는 WebFlux(reactive) 기반이므로 명시적으로 고정한다.
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service-orders
              uri: ${ORDER_SERVICE_URI:http://localhost:8088}
              # 백엔드 컨트롤러 매핑에 맞춘 경로(게이트웨이는 prefix 미변경 전달). order 는 컨트롤러별
              # prefix 가 혼재한다: 거래/회원/인증계는 비-/api(/auth,/users,/orders,/payments,/coupons,
              # /reviews,/games,/categories,/memberships,/products), 상품/카테고리/태그/환불이력은 /api.
              predicates:
                - Path=/auth/**,/users/**,/orders/**,/payments/**,/coupons/**,/reviews/**,/games/**,/categories/**,/memberships/**,/products/**,/api/products/**,/api/categories/**,/api/tags/**,/api/payments/**,/admin/categories/**,/admin/products/**,/admin/pg/**,/admin/menus/**,/admin/common-codes/**,/admin/rbac/**,/admin/settlement-projection/**
            - id: loan-service
              uri: ${LOAN_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/loans/**
            - id: financial-statements-service
              uri: ${FINANCIAL_SERVICE_URI:http://localhost:8086}
              # 공개 조회 API 만 라우팅 — DART 수집 트리거(/admin/financial/**)는 외부 미노출
              predicates:
                - Path=/api/financial/**
            - id: economics-service
              uri: ${ECONOMICS_SERVICE_URI:http://localhost:8087}
              # 공개 조회 API 만 라우팅 — ECOS 수집 트리거(/admin/economics/**)는 외부 미노출
              predicates:
                - Path=/api/economics/**
            - id: company-service
              uri: ${COMPANY_SERVICE_URI:http://localhost:8090}
              # 공개 조회 API 만 라우팅 — 뉴스 수집 트리거(/admin/company/**)는 외부 미노출
              predicates:
                - Path=/api/company/**
            - id: market-service
              uri: ${MARKET_SERVICE_URI:http://localhost:8094}
              # 공개 조회 API 만 라우팅 — KRX 시세 수집 트리거(/admin/market/**)는 외부 미노출
              predicates:
                - Path=/api/market/**
            - id: common-data-service
              uri: ${COMMON_DATA_SERVICE_URI:http://localhost:8098}
              # 공개 조회 API 만 라우팅 — 소스 등록/수집 트리거(/admin/commondata/**)는 외부 미노출
              predicates:
                - Path=/api/common-data/**
            - id: ai-service
              uri: ${AI_SERVICE_URI:http://localhost:8096}
              # AI 챗봇 — 채팅/대화 이력. 서비스 자체 보안 체인이 JWT(USER 이상)를 강제
              predicates:
                - Path=/api/ai/**
            - id: operation-service
              uri: ${OPERATION_SERVICE_URI:http://localhost:8092}
              # 운영 관제 콘솔(인시던트) — JWT ROLE_ADMIN 전용, webhook 은 Bearer 필터가 자체 게이팅
              predicates:
                - Path=/api/ops/**
            - id: investment-service
              uri: ${INVESTMENT_SERVICE_URI:http://localhost:8100}
              # 투자서비스 — 투자점수/주문/재원. shared-common JWT 체인이 인증 강제
              predicates:
                - Path=/api/investment/**
            - id: account-service
              uri: ${ACCOUNT_SERVICE_URI:http://localhost:8102}
              # 계정계 — 대출·투자·정산 GL 집계/시산표. shared-common JWT 체인이 인증 강제
              predicates:
                - Path=/api/account/**
            - id: organization-service
              uri: ${ORGANIZATION_SERVICE_URI:http://localhost:8104}
              # 조직관리 — 셀러/기업 조직·멤버십·역할. shared-common JWT 체인이 인증 강제
              predicates:
                - Path=/api/organizations/**
            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URI:http://localhost:8082}
              # SettlementController 는 /settlements(비-/api), 검색/원장/리포트는 /api, 운영 콘솔은 /admin.
              predicates:
                - Path=/settlements/**,/api/settlements/**,/api/ledger/**,/api/reports/**,/admin/payouts/**,/admin/chargebacks/**,/admin/pg-reconciliation/**,/admin/reconciliation/**,/admin/dlq/**,/admin/backfill/**
            - id: market-stream-service
              uri: ${MARKET_STREAM_SERVICE_URI:http://localhost:8110}
              # 폴리글랏(Go, 8110) 실시간 시세 SSE — 공개 read-only 스트림만 라우팅.
              # 서비스 실경로는 /stream/{code} 라 프리픽스를 벗겨 전달한다. /ws/** 는 미노출(프론트는 SSE 만 사용).
              predicates:
                - Path=/api/market-stream/**
              filters:
                - RewritePath=/api/market-stream/(?<segment>.*), /$\{segment}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
