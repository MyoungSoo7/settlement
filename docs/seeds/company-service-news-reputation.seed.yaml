# Seed: company-service 뉴스·평판·문서함 as-is 사양 (Ouroboros 방법론 — Interview → Seed 결정화)
# 상태: CONFIRMED (order/settlement seed 와 동일 방식 지시로 승인 승계, 2026-07-19)
# 원칙: 이 Seed 는 "현행 코드가 실제로 하는 일"의 불변 기술이다. 결함은 교정하지 않고 known_issues 로만 기록한다.
# 자매 Seed: order-service-core-commerce / settlement-service-accounting-core

seed:
  id: company-service-news-reputation-v1
  goal: >-
    company-service(뉴스 수집·평판 스코어링·문서함, ADR 0023)의 현행 동작 — url_hash 멱등 수집,
    INSERT-only 평판 스냅샷, 감성분석 fail-open 폴백 체인, 문서함 역할 게이트 — 을
    실행 가능한 게이트에 매핑된 불변 사양으로 결정화해, 회귀 기준선 · 계약 드리프트 게이트 ·
    면접/포트폴리오 문서 · 후속 기능 베이스로 사용한다.

  scope:
    included:
      - article (수집·url_hash 멱등·본문 미저장)
      - reputation (산식 v1·등급·INSERT-only 스냅샷·등급변동 이벤트)
      - sentiment (분석 4구현체 폴백 체인·캐시)
      - document (문서함 업로드/다운로드·역할 게이트)
      - 발행 1토픽 + 소비 1토픽 계약 표면
    excluded:
      - audit 서브패키지 내부 (감사행 기록 사실만 경계 기재)
      - NaverNewsApiClient 외부 API 페이로드 상세

  constraints:
    - "기사 본문 저장 금지(저작권) — title 500·summary 2000 절단, body 필드 없음"
    - "평판 스코어 스냅샷 INSERT-only — UPDATE/DELETE 는 DB 트리거가 봉쇄"
    - "헥사고날: domain 은 adapter 를 import 하지 않는다 (ArchUnit 강제)"
    - "이벤트 발행은 Outbox 경유만 (ADR 0024 계약-as-code)"
    - "감성분석은 fail-open — LLM 실패가 평판 배치를 막지 않는다(키워드 폴백)"
    - "문서함 GET 2경로는 JWT ADMIN/MANAGER — 공개 permitAll 규칙보다 먼저 선언(첫 매칭 우선)"

  invariants:  # as-is 코드 사실 — 파일:라인 근거 (경로 접두 company-service/src/main/java/github/lms/lemuel/company/)
    article_idempotency:
      source: domain/Article.java:57-101 + adapter/out/persistence/ArticlePersistenceAdapter.java:56-66
      rule: "정규화 URL(fragment 만 제거, 트래킹 파라미터 의도적 보존) SHA-256 = url_hash. 3층 방어: seenInBatch → existsByUrlHash → DataIntegrityViolation catch. 재수집 saved=0 무해"
      db: "articles.url_hash UNIQUE (V1__company_core.sql:22)"
    no_body_storage:
      source: domain/Article.java:13-31,62-63
      rule: "필드 8개(urlHash·stockCode·source·title·summary·publisher·url·publishedAt)뿐 — body/content 없음. MAX_TITLE=500·MAX_SUMMARY=2000 절단"
    reputation_formula_v1:
      source: domain/ReputationScore.java:76-79 + domain/IssueCategory.java:9-18 + domain/ReputationGrade.java:8-22
      formula: "score = 100 − round(100 × weightedPenalty / (total × MAX_WEIGHT)), 0~100 clamp, 빈 목록 = 100점"
      weights: "FINANCIAL/LEGAL/GOVERNANCE 3 · LABOR/PRODUCT 2 · 미분류 부정 1 · 비부정 0 (category 는 NEGATIVE 에만 부착 — ArticleSentiment.java:11-18)"
      grades: "A≥80 · B≥60 · C≥40 · D≥20 · E<20"
    reputation_append_only:
      source: application/service/ReputationRecalcService.java:95-97 + adapter/out/persistence/ReputationPersistenceAdapter.java:51
      rule: "하루 1건 — (stock_code, snapshot_date) UNIQUE (V3:26) + saveIfAbsent. DB 트리거 trg_reputation_scores_append_only 가 UPDATE/DELETE 봉쇄 (V20260716306000)"
      event_atomicity: "스냅샷 저장 + 등급변동 이벤트 발행 한 트랜잭션, 등급 변동 시(최초 포함)만 발행 (ReputationSnapshotWriter.java:39-51)"
    sentiment_fail_open_chain:
      source: adapter/out/analysis/{QuotaGuardedSentimentAnalyzer.java:53-79, GeminiSentimentAnalyzer.java:44-57, SentimentLabels.java:30-41}
      rule: "Gemini(일쿼터+분당 스로틀 가드, @Primary) → 초과/실패 시 Keyword 폴백(throw 없음). 알 수 없는 LLM 라벨 → NEUTRAL. (url_hash, provider) 캐시 우선 (V20260719100000)"
    document_gate:
      source: config/SecurityConfig.java:87-92 + domain/CompanyDocument.java:16,46-84
      rule: "문서 목록·다운로드 GET 은 hasAnyRole(ADMIN,MANAGER) — 공개 permitAll 보다 먼저. 검증: stockCode \\d{6}, 파일명 ≤255·경로문자 차단, Content-Type 서버 파생(docx/pdf/png/md), ≤20MB. (stockCode,fileName) 재업로드=교체 (V6:19)"
    seller_link_manual_only:
      source: adapter/in/kafka/UserRegisteredEventConsumer.java:20-67
      rule: "user.registered 엔 기업 키가 없어 자동 매핑 불가 — 셀러 축적만, 링크는 admin 명시 링크(1셀러 1기업, V5:9,15)"

  event_contracts:
    published:
      - topic: lemuel.company.reputation_changed
        producer: adapter/out/event/CompanyReputationEventPublisherAdapter.java:29-65 (Outbox 경유, kafkaTemplate 직접 호출 없음)
        payload: stockCode·snapshotDate·score·grade·previousGrade(nullable)·articleCount·negativeCount·sellerIds·calculatedAt
        consumer_side: loan (신용 리스크 프로젝션)
    consumed:
      - { topic: lemuel.user.registered, consumer: UserRegisteredEventConsumer (group lemuel-company, IdempotentEventConsumer 상속), effect: 셀러 목록 축적 }
    idempotency: "outbox event_id UNIQUE + processed_events (consumer_group,event_id) PK (V4:33-51), prune 보존 하한 ≥7일 (V20260717300000)"
    schema_source: shared-common/src/testFixtures/resources/contracts/events/lemuel.company.reputation_changed.schema.json (ADR 0024)

  acceptance_criteria:  # 실행 가능 — 각 AC 는 기존 게이트에 매핑
    - id: AC-1
      criterion: 평판 산식 v1·등급 구간·카테고리 가중치가 위 invariants 와 일치한다
      gate: "./gradlew :company-service:test — ReputationScoreTest·ArticleSentimentTest 등 도메인 테스트"
    - id: AC-2
      criterion: 발행 1토픽·소비 1토픽이 JSON Schema 계약과 일치한다 (양방향)
      gate: "CompanyReputationEventContractTest (프로듀서측) + EventContractConsumerTest (컨슈머측)"
    - id: AC-3
      criterion: 헥사고날 의존 방향 위반 0
      gate: "HexagonalArchitectureTest (ArchUnit 3룰)"
    - id: AC-4
      criterion: 커버리지 LINE >= 90%, 핵심 도메인 INSTRUCTION >= 80%
      gate: "./gradlew :company-service:jacocoTestCoverageVerification (check 편입)"
    - id: AC-5
      criterion: 문서함 역할 게이트 회귀 0 (공개 경로 우선순위 역전 = IDOR 재발)
      gate: "CompanyDocumentSecurityTest"
    - id: AC-6
      criterion: 평판 스냅샷 append-only — UPDATE/DELETE 시도는 DB 가 거부한다
      gate: "DB 트리거 trg_reputation_scores_append_only (ERRCODE 23514) + guard.mjs IMMUTABLE-HISTORY 계열"

  known_issues:  # 발견만 기록 — 사양은 as-is 유지
    - id: KI-1
      finding: "감성 캐시 키 provider 가 gemini/llm/keyword 문자열 — 쿼터 초과분이 키워드 결과로 캐시 고정(LLM 재승격 없음), 한 스냅샷이 혼합 provider 산정 가능 (QuotaGuardedSentimentAnalyzer.java:24-26, ReputationRecalcService.java:117-123)"
      disposition: by-design-documented (javadoc 트레이드오프 명시) — 개선 후보
    - id: KI-2
      finding: "문서 다운로드 게이트가 SecurityConfig 규칙 순서(첫 매칭)에만 의존 — 컨트롤러/서비스 2차 방어 없음. CompanyDocumentSecurityTest 가 유일한 회귀 방어"
      disposition: recorded-not-fixed
    - id: KI-3
      finding: "문서 파일 바이트 DB BYTEA 직저장 — 볼륨·백업 선형 증가 (V20260715151000:24-25 컬럼 주석 ⚠️ 명시)"
      disposition: by-design (MVP, 알려진 리스크)
    - id: KI-4
      finding: "문서 드리프트 3건 — ① ADR 0023 §2 'gateway 미라우팅' 낡음(현재 /api/company/** 라우팅됨) ② 스킬 :51 'CLAUDE 미의존 문구 신뢰 금지' 경고 자체가 낡음 ③ SecurityConfig.java:31 javadoc 이 아래 @Import 와 모순. 코드↔스킬 규칙 불일치는 0건"
      disposition: doc-drift (코드 아님 — 문서 갱신 후보)

  uses:
    - regression-baseline
    - contract-drift-gate
    - interview-portfolio
    - brownfield-base
