# Seed: settlement-service 회계 코어 루프 as-is 사양 (Ouroboros 방법론 — Interview → Seed 결정화)
# 상태: CONFIRMED (order-service seed 와 동일 방식 지시로 승인 승계, 2026-07-18)
# 원칙: 이 Seed 는 "현행 코드가 실제로 하는 일"의 불변 기술이다. 결함은 교정하지 않고 known_issues 로만 기록한다.
# 자매 Seed: order-service-core-commerce.seed.yaml (돈 흐름의 원천측)

seed:
  id: settlement-service-accounting-core-v1
  goal: >-
    settlement-service 회계 코어 루프(정산 생성·수수료/홀드백 계산·출금·복식부기 원장 +
    소비/발행 이벤트 계약과 프로젝션 뷰)의 현행 동작을 실행 가능한 게이트에 매핑된
    불변 사양으로 결정화해, 회귀 기준선 · 계약 드리프트 게이트 · 면접/포트폴리오 문서 ·
    후속 기능 베이스로 사용한다.

  scope:
    included:
      - settlement (생성·상태머신·수수료 스냅샷·홀드백·환불 조정)
      - payout (출금 상태머신)
      - ledger (복식부기 전표·PENDING→POSTED→REVERSED)
      - 소비 이벤트 계약 표면 (프로젝션 5토픽 + loan.repayment_applied)
      - 발행 이벤트 계약 2토픽 (settlement.created / settlement.confirmed)
      - 프로젝션 뷰 4종 (settlement_{order,payment,user,product}_view, ADR 0020)
    excluded:
      - chargeback, pgreconciliation, report, recon 서브도메인 내부
        (단, pgreconciliation.discrepancy_approved 소비 → 정산 조정 진입점은 경계 사실로만 기재)
      - integrity 스위트, search 인덱싱 어댑터 내부

  constraints:
    - "MSA 경계: order-service import·DB 조인 금지 — Kafka 프로젝션 + /internal/recon 만 (ADR 0020)"
    - "헥사고날: domain 은 adapter 를 import 하지 않는다 (ArchUnit 강제)"
    - "금액은 BigDecimal, 라운딩 정책 보존"
    - "원장: 한쪽 계정만 있는 반쪽 전표 금지 — 차1·대1 균형 팩토리만. POSTED 수정 금지(역분개만)"
    - "DONE/COMPLETED/POSTED 이후 수정 없음 — 정정은 조정 트랜잭션(settlement_adjustments 음수 행)·역분개로만 (ADR 0004)"
    - "이벤트 발행은 Outbox 경유만 (ADR 0024 계약-as-code)"

  invariants:  # as-is 코드 사실 — 파일:라인 근거
    settlement_state_machine:
      source: settlement-service/src/main/java/github/lms/lemuel/settlement/domain/SettlementStatus.java:33-48
      transitions: "REQUESTED→PROCESSING|CANCELED, PROCESSING→DONE|FAILED|CANCELED, FAILED→REQUESTED(재시도)|CANCELED; DONE/CANCELED 종단"
    payout_state_machine:
      source: settlement-service/src/main/java/github/lms/lemuel/payout/domain/PayoutStatus.java:40-54
      transitions: "REQUESTED→SENDING|CANCELED, SENDING→COMPLETED|FAILED, FAILED→REQUESTED(retry)|CANCELED; SENDING→CANCELED 불허(송금 중 취소 차단), COMPLETED/CANCELED 종단"
    ledger_invariants:
      source: settlement-service/src/main/java/github/lms/lemuel/ledger/domain/{LedgerStatus.java:20-26, LedgerEntry.java}
      status: "PENDING→POSTED|REVERSED, POSTED→REVERSED; REVERSED 종단. 엔트리 불변 — 정정은 신규 엔트리로만"
      balance: "전표 = (debitAccount, creditAccount, amount>0) 쌍, 계정 상이 강제(LedgerEntry.java:183-188), balancedPairForSettlement 균형 팩토리(:117)"
    tier_policy:  # 정본: settlement-domain-rules 스킬과 코드 일치 확인
      source: settlement-service/src/main/java/github/lms/lemuel/settlement/domain/SellerTier.java:11-17
      table:
        NORMAL: { rate: "0.0350", cycle: T+7, holdback: "30% / 30일" }
        VIP: { rate: "0.0250", cycle: T+3, holdback: "10% / 14일" }
        STRATEGIC: { rate: "0.0200", cycle: T+1, holdback: "0% / 즉시 전액" }
      cycle_override: "users.settlement_cycle 명시값 우선, 미지정 시 SellerTier.defaultCycle (SellerTier.java:36-41)"
      calc_order: "수수료 차감 → net → net 에 홀드백율 → 즉시지급/보류 분리. 해제일은 영업일 기준(BusinessDayCalculator)"
    commission_snapshot:
      source: settlement-service/src/main/java/github/lms/lemuel/settlement/domain/Settlement.java:38,82
      rule: "정산 생성 시점 요율을 settlements.commission_rate 에 영구 저장(V32) — 등급 변경돼도 과거 정산 재계산 없음. null(레거시 행)은 기본율 3% 폴백"
    reverse_settlement:
      rule: "환불/취소 시 기존 정산 row 불변 — settlement_adjustments 음수 행 추가(당시 스냅샷 요율 적용) + 원장 역분개 (ADR 0004)"
      consumer: PaymentRefundedSettlementAdjustConsumer (lemuel.payment.refunded)
    idempotency_3tier:
      - "① outbox_events.event_id UUID UNIQUE (발행측)"
      - "② processed_events (consumer_group, event_id) PK (V1__settlement_baseline.sql:202) — prune 보존 하한 ≥7일 가드(V20260716301000)"
      - "③ 도메인 UNIQUE: uk_settlements_payment_id (V1:32) — 결제 1건당 정산 1건"

  event_contracts:
    consumed:  # 컨슈머 소스: settlement-service/.../adapter/in/kafka/
      - { topic: lemuel.order.created, consumer: OrderEventKafkaConsumer, effect: settlement_order_view 적재 }
      - { topic: lemuel.payment.captured, consumer: PaymentEventKafkaConsumer, effect: settlement_payment_view + 정산 생성 }
      - { topic: lemuel.payment.refunded, consumer: "PaymentRefundedViewConsumer(뷰) + PaymentRefundedSettlementAdjustConsumer(조정)", effect: 뷰 갱신 + 역정산 조정 }
      - { topic: lemuel.user.registered, consumer: UserRegisteredEventConsumer, effect: settlement_user_view 적재 }
      - { topic: lemuel.product.changed, consumer: ProductEventKafkaConsumer, effect: settlement_product_view 적재 }
      - { topic: lemuel.loan.repayment_applied, consumer: LoanRepaymentAppliedConsumer, effect: 선정산 상환 반영 }
    consumed_boundary_note: "lemuel.pgreconciliation.discrepancy_approved → PgReconciliationApprovedSettlementAdjustConsumer 도 정산 조정에 진입하나, pgreconciliation 서브도메인은 본 Seed 범위 밖"
    published:
      - lemuel.settlement.created
      - lemuel.settlement.confirmed
    schema_source: shared-common/src/testFixtures/resources/contracts/events/*.schema.json (+samples, ADR 0024)

  acceptance_criteria:  # 실행 가능 — 각 AC 는 기존 게이트에 매핑
    - id: AC-1
      criterion: 상태머신 4종(Settlement/Payout/Ledger/Adjustment) 전이표가 위 invariants 와 일치한다
      gate: "./gradlew :settlement-service:test — 도메인 테스트"
    - id: AC-2
      criterion: 발행 2토픽·소비 6토픽이 JSON Schema 계약과 일치한다 (양방향, 드리프트 시 빌드 실패)
      gate: "SettlementEventContractTest (프로듀서측) + EventContractConsumerTest (컨슈머측)"
    - id: AC-3
      criterion: 헥사고날 의존 방향·프로젝션 경계 위반 0
      gate: "SettlementProjectionArchitectureTest (ArchUnit)"
    - id: AC-4
      criterion: 커버리지 LINE >= 90%, 핵심 도메인 INSTRUCTION >= 80%
      gate: "./gradlew :settlement-service:jacocoTestCoverageVerification (check 편입)"
    - id: AC-5
      criterion: 등급 3종 × (정상/환불/경계금액) 수수료·홀드백 계산이 정본 표와 일치, 시산표 차대 균형
      gate: "도메인 계산 테스트 + MCP settlement_simulate 교차검증 (통합은 Testcontainers — Docker 전제)"
    - id: AC-6
      criterion: 도메인 OO 불변식 (public setter 0, generic IAE 0, rehydrate/팩토리 전용)
      gate: "guard.mjs OO-* (실시간) + oo-gate.test.mjs (CI 전수)"

  known_issues:  # 발견만 기록 — 사양은 as-is 유지
    - id: KI-1
      finding: "SettlementStatus.fromString 이 알 수 없는 값에서 REQUESTED 로 조용히 폴백 (SettlementStatus.java:24-31) — V26 롤백 대비 방어로 문서화돼 있으나 order KI-1 과 동일한 silent default 패턴"
      disposition: by-design-documented (롤백 방어 주석 있음)
    - id: KI-2
      finding: "SellerTier.fromStringOrDefault 가 오타/미지정 등급을 NORMAL(3.5%) 로 조용히 폴백 (SellerTier.java:53-59) — 등급 데이터 오염 시 수수료가 소리 없이 기본율로 계산될 수 있음"
      disposition: recorded-not-fixed
    - id: KI-3
      finding: "레거시 Settlement.COMMISSION_RATE(3%) 상수 잔존 — commission_rate null 레거시 행 폴백 전용, 신규 코드 참조 금지가 규칙이나 컴파일 수준 차단은 없음"
      disposition: by-design (레거시 호환)

  uses:
    - regression-baseline
    - contract-drift-gate
    - interview-portfolio
    - brownfield-base
