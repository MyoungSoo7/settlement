spring:
  profiles:
    active: local

  application:
    name: lemuel

  datasource:
    url: jdbc:postgresql://localhost:5432/opslab
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_schema: opslab

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: opslab
    default-schema: opslab
    create-schemas: true
    validate-on-migrate: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

  data:
    elasticsearch:
      repositories:
        enabled: false

  elasticsearch:
    uris: https://5d37123531be45ad8e84d19cca735fb5.us-central1.gcp.cloud.es.io
    username: ${ELASTICSEARCH_USER}
    password: ${ELASTICSEARCH_PASSWORD}
    connection-timeout: 5s
    socket-timeout: 60s

  # Kafka 설정 — app.kafka.enabled 로 활성/비활성 스위칭
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all                                 # 모든 in-sync replica 확인 (신뢰성 우선)
      retries: 5
      properties:
        enable.idempotence: true                # 프로듀서 중복 발행 방지
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
    consumer:
      group-id: lemuel-settlement
      auto-offset-reset: earliest               # 새 컨슈머는 시작부터 재생
      enable-auto-commit: false                 # 수동 ack → 멱등 처리 후 커밋
      properties:
        isolation.level: read_committed
    listener:
      ack-mode: manual_immediate
      missing-topics-fatal: false

  # Graceful Shutdown for K8s Rolling Update
  lifecycle:
    timeout-per-shutdown-phase: 30s  # Pod 종료 시 최대 30초 대기

  batch:
    jdbc:
      initialize-schema: always  # BATCH_* 테이블 자동 생성
    job:
      enabled: false  # 애플리케이션 시작 시 자동 실행 방지

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
            # 아래 설정을 추가하거나 확인해 보세요
          ssl:
            trust: smtp.gmail.com
            protocols: TLSv1.2
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

# Server Configuration
server:
  port: 8088
  shutdown: graceful  # Graceful Shutdown 활성화
  tomcat:
    connection-timeout: 20s
    threads:
      max: 200
      min-spare: 10
    uri-encoding: UTF-8  # URL 파라미터 한글 인코딩
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true  # 요청/응답 모두 UTF-8 강제


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true  # K8s Liveness/Readiness Probe 활성화
  health:
    mail:
      enabled: false
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    elasticsearch:
      enabled: false
    db:
      enabled: true  # PostgreSQL Health Check
  server:
    port: 8089  # 로컬 dev: 메인(8080)과 분리. Docker: MANAGEMENT_SERVER_PORT=8080으로 오버라이드하여 단일 포트로 통합
  metrics:
    distribution:
      percentiles-histogram:
        refund.processing.duration: true
        settlement.batch.creation.duration: true
        settlement.batch.confirmation.duration: true
        settlement.batch.adjustment.duration: true
      percentiles:
        refund.processing.duration: 0.5,0.95,0.99
        settlement.batch.creation.duration: 0.5,0.95,0.99
        settlement.batch.confirmation.duration: 0.5,0.95,0.99
        settlement.batch.adjustment.duration: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}         # 로컬 개발 기본 OFF — 프로덕션 compose/K8s 에서 true
    topic:
      payment-captured: lemuel.payment.captured
      payment-refunded: lemuel.payment.refunded
  outbox:
    polling-delay-ms: 2000
  search:
    enabled: false
  jwt:
    issuer: ${JWT_ISSUER}
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS}
  alerting:
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL}
      channel: ${SLACK_CHANNEL}
      enabled: ${SLACK_ALERTS_ENABLED}
  mail:
    from: ${MAIL_FROM:}
    support-email: ${SUPPORT_EMAIL}
  password-reset:
    token-expiry-minutes: 30
    base-url: ${APP_BASE_URL:http://localhost:5173}

toss:
  secret-key: ${TOSS_SECRET_KEY}
  api-url: https://api.tosspayments.com/v1/payments/confirm

# Resilience4j — Toss PG 호출 복원력
resilience4j:
  circuitbreaker:
    instances:
      tossPg:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20                    # 최근 20회 요청 기준
        minimumNumberOfCalls: 10                 # 최소 10건 수집 후 판정
        failureRateThreshold: 50                 # 50% 이상 실패면 OPEN
        waitDurationInOpenState: 30s             # OPEN → HALF_OPEN 대기
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 4xx 는 PG 쪽의 비즈니스 오류 (결제키 만료 등) 이므로 서킷 판정에서 제외
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      tossPg:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        # 4xx 는 재시도해도 똑같이 실패 — 재시도 안 함
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException


