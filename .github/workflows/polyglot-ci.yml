name: polyglot-ci

# 신규 polyglot 서비스(Go/Python) 전용 CI. 기존 Java `ci` 워크플로와 독립이며,
# 변경된 서비스 디렉터리만 빌드·테스트한다(paths 필터). 필수 체크는 아니고(정보성),
# Java harness-guard/STATUS 카운트에는 영향이 없다(신규 Java/마이그레이션/ADR 없음).

on:
  push:
    branches: [main, develop]
    paths:
      - "market-stream-service/**"
      - "payment-webhook-service/**"
      - "screening-backtest-service/**"
      - "settlement-anomaly-service/**"
      - "forecast-service/**"
      - ".github/workflows/polyglot-ci.yml"
  pull_request:
    paths:
      - "market-stream-service/**"
      - "payment-webhook-service/**"
      - "screening-backtest-service/**"
      - "settlement-anomaly-service/**"
      - "forecast-service/**"
      - ".github/workflows/polyglot-ci.yml"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }} # MyoungSoo7/settlement (metadata-action 가 소문자화)

jobs:
  go:
    name: Go build & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [market-stream-service, payment-webhook-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  python:
    name: Python test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - screening-backtest-service
          - settlement-anomaly-service
          - forecast-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
          pip install pytest httpx
      - name: Test
        run: pytest -q

  # 이미지 빌드 & ghcr 푸시 — push 이벤트(main/develop)에서만. 테스트 통과 후 실행.
  # 각 서비스는 자체 Dockerfile → ghcr.io/myoungsoo7/settlement-<suffix>.
  # 태그: <branch> / <branch>-<sha7> / latest(기본브랜치). image-updater 가 <branch>-<sha7> 추적.
  build-push:
    name: Build & Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [go, python]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: market-stream-service
            suffix: "-market-stream"
          - name: payment-webhook-service
            suffix: "-payment-webhook"
          - name: screening-backtest-service
            suffix: "-screening-backtest"
          - name: settlement-anomaly-service
            suffix: "-anomaly"
          - name: forecast-service
            suffix: "-forecast"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.name }}
          file: ./${{ matrix.name }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
