name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: "25"
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}
  FRONTEND_IMAGE: ${{ github.repository }}-frontend

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      # 변경된 백엔드 서비스만 담은 이미지 빌드 매트릭스: {"include":[{module,image_suffix},...]}
      build_matrix: ${{ steps.setmatrix.outputs.matrix }}
      # 빌드할 서비스가 하나라도 있으면 true (backend-ghcr 실행 게이트)
      build_any: ${{ steps.setmatrix.outputs.any }}
      # backend-ci 가 실행할 gradle 테스트 태스크 (변경 모듈만 / shared·모호 변경 시 전체 build)
      test_tasks: ${{ steps.setmatrix.outputs.test_tasks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - '**'
              - '!frontend/**'
            # shared: 전 서비스 이미지에 영향 → 변경 시 14개 전부 재빌드
            shared:
              - 'shared-common/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'
            order-service: ['order-service/**']
            settlement-service: ['settlement-service/**']
            gateway-service: ['gateway-service/**']
            account-service: ['account-service/**']
            operation-service: ['operation-service/**']
            loan-service: ['loan-service/**']
            financial-statements-service: ['financial-statements-service/**']
            economics-service: ['economics-service/**']
            company-service: ['company-service/**']
            market-service: ['market-service/**']
            common-data-service: ['common-data-service/**']
            ai-service: ['ai-service/**']
            investment-service: ['investment-service/**']
            organization-service: ['organization-service/**']

      - name: Compute image build matrix (changed services only)
        id: setmatrix
        env:
          CHANGED: ${{ steps.filter.outputs.changes }}   # dorny: 매치된 필터명 JSON 배열
        run: |
          set -euo pipefail
          # 배포 단위 단일 출처: module → image_suffix (아래 backend-ghcr 주석의 매핑과 반드시 일치)
          mapping='{
            "order-service":"",
            "settlement-service":"-settlement",
            "gateway-service":"-gateway",
            "account-service":"-account",
            "operation-service":"-operation",
            "loan-service":"-loan",
            "financial-statements-service":"-financial",
            "economics-service":"-economics",
            "company-service":"-company",
            "market-service":"-market",
            "common-data-service":"-common-data",
            "ai-service":"-ai",
            "investment-service":"-investment",
            "organization-service":"-organization"
          }'
          if echo "$CHANGED" | jq -e 'index("shared")' >/dev/null; then
            # 공용 변경 → 전 서비스 재빌드
            include=$(echo "$mapping" | jq -c '[to_entries[] | {module:.key, image_suffix:.value}]')
          else
            # 변경된 서비스만 (필터명 == 모듈 디렉터리명)
            include=$(echo "$mapping" | jq -c --argjson ch "$CHANGED" \
              '[to_entries[] | select(.key as $k | $ch | index($k)) | {module:.key, image_suffix:.value}]')
          fi
          count=$(echo "$include" | jq 'length')
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          echo "any=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "이미지 빌드 대상 서비스: ${count}개 → $include"
          # 테스트 태스크: shared 변경→전체 build, 변경 서비스만 있으면 해당 모듈만,
          # 그 외(모듈·shared 모두 아닌 모호한 backend 변경)→안전하게 전체 build (게이트 약화 방지)
          if echo "$CHANGED" | jq -e 'index("shared")' >/dev/null; then
            test_tasks="build"
          elif [ "$count" -gt 0 ]; then
            test_tasks=$(echo "$include" | jq -r '[.[] | ":\(.module):build"] | join(" ")')
          else
            test_tasks="build"
          fi
          echo "test_tasks=$test_tasks" >> "$GITHUB_OUTPUT"
          echo "테스트 태스크: $test_tasks"

  backend-ci:
    name: Backend - Build/Test/JaCoCo/SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 90   # hang 시 러너 6시간 낭비 방지 (정상 55~70분 + 여유)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      pull-requests: write
      checks: write
      security-events: write
      packages: read   # ghcr 미러 이미지 pull (mirror-testcontainers.yml 참고)
    services:
      postgres:
        # Docker Hub rate limit 회피 — ghcr 미러 사용 (mirror-testcontainers.yml 로 갱신)
        image: ghcr.io/myoungsoo7/mirror/postgres:17
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 테스트가 서비스 PG 를 쓸 수 있도록 스키마를 빌드 전에 준비
      - name: Init schema (opslab)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "CREATE SCHEMA IF NOT EXISTS opslab;"

      # Testcontainers 가 ghcr 미러(비공개 패키지 가능)에서 pull 할 수 있게 데몬 로그인.
      # Docker Hub rate limit 회피 — 각 모듈 testcontainers.properties 의
      # hub.image.name.prefix=ghcr.io/myoungsoo7/mirror/ 와 세트.
      - name: Login to GHCR (for Testcontainers pulls)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # build = compile + test + jacocoTestReport + jacocoTestCoverageVerification (게이트 포함, build.gradle.kts:157)
      # test_tasks = 변경 모듈만(`:<mod>:build`) / shared·모호 변경 시 전체 `build` (changes 잡이 산출)
      # Testcontainers 기반 통합테스트는 러너의 Docker 데몬을 사용한다.
      - name: Build & Test (JaCoCo gate)
        run: ./gradlew clean ${{ needs.changes.outputs.test_tasks }} --no-daemon --stacktrace
        env:
          # ryuk(정리용 유틸 컨테이너) 비활성화 — 러너는 일회용이라 불필요하고,
          # 이미지 치환과 얽혀 모듈별 test JVM 에서 비결정적 hang 을 유발했다 (2026-07-08).
          TESTCONTAINERS_RYUK_DISABLED: "true"
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_ELASTICSEARCH_URIS: http://localhost:9200

      - name: Upload test/coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports
          path: |
            */build/reports/jacoco/test/
            */build/reports/tests/test/
          retention-days: 30

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/*/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: ./gradlew sonar --no-daemon --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_ELASTICSEARCH_URIS: http://localhost:9200

      - name: Run Snyk Security Scan (Backend)
        uses: snyk/actions/gradle-jdk21@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  #      - name: SonarCloud Quality Gate
  #        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
  #        timeout-minutes: 5
  #        env:
  #          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #        with:
  #          scanMetadataReportFile: build/sonar/report-task.txt

  backend-ghcr:
    name: Backend - Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [changes, backend-ci]
    if: github.event_name != 'pull_request' && needs.changes.outputs.build_any == 'true'
    permissions:
      contents: read
      packages: write
    # 배포 단위별 이미지(ADR 0020) — 변경된 백엔드 서비스만 이미지화(매트릭스는 changes 잡이 계산).
    #   order-service        → ghcr.io/myoungsoo7/settlement
    #   settlement-service   → ghcr.io/myoungsoo7/settlement-settlement
    #   gateway-service      → ghcr.io/myoungsoo7/settlement-gateway
    #   account-service      → ghcr.io/myoungsoo7/settlement-account
    #   operation-service    → ghcr.io/myoungsoo7/settlement-operation
    #   loan-service         → ghcr.io/myoungsoo7/settlement-loan
    #   financial-*-service  → ghcr.io/myoungsoo7/settlement-financial
    #   economics-service    → ghcr.io/myoungsoo7/settlement-economics
    #   company-service      → ghcr.io/myoungsoo7/settlement-company
    #   market-service       → ghcr.io/myoungsoo7/settlement-market
    #   common-data-service  → ghcr.io/myoungsoo7/settlement-common-data
    #   ai-service           → ghcr.io/myoungsoo7/settlement-ai
    #   investment-service   → ghcr.io/myoungsoo7/settlement-investment
    #   organization-service → ghcr.io/myoungsoo7/settlement-organization
    # shared-common·루트 빌드파일·Dockerfile·ci.yml 변경 시엔 changes 잡이 14개 전부 매트릭스에 담는다.
    strategy:
      fail-fast: false   # 한 서비스 빌드 실패가 다른 서비스 이미지 푸시를 취소하지 않도록
      matrix: ${{ fromJSON(needs.changes.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 준비: Docker Hub 로그인 (추후 사용)
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Dockerfile 의 ARG MODULE 가 비어있으면 'gradle ::bootJar' 처럼 빈 세그먼트가 되어 빌드 실패.
          # matrix.module selects the deployable Gradle service built into this image.
          build-args: |
            MODULE=${{ matrix.module }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  frontend-ci:
    name: Frontend - Production Build & Quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Production typecheck (excludes test files)
      - name: TypeScript type check (production code only)
        working-directory: frontend
        run: npm run typecheck

      - name: ESLint check
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      # Build production bundle
      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '' }}
          TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY || 'test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Run Snyk Security Scan (Frontend)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # Optional: Separate test job (disabled by default)
  frontend-tests:
    name: Frontend - Tests (Optional)
    runs-on: ubuntu-latest
    needs: changes
    # Only run if explicitly triggered or if RUN_TESTS env var is set
    if: false  # Change to 'needs.changes.outputs.frontend == true' to enable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-coverage
          path: frontend/coverage
          retention-days: 30

  frontend-ghcr:
    name: Frontend - Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [changes, frontend-ci]
    if: github.event_name != 'pull_request' && needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '' }}
            VITE_TOSS_CLIENT_KEY=${{ secrets.VITE_TOSS_CLIENT_KEY || 'test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # main 머지 후 ArgoCD plain Directory 앱의 manifest reconciliation 시간을 둔 다음,
  # 현재 배포된 운영 revision(jen.lemuel.co.kr)을 E2E smoke 한다.
  # 이 job은 새 mutable image tag의 promotion을 증명하지 않는다.
  #
  # needs 의 4 단계 (ci + ghcr) 를 모두 포함 — ci 가 실패하면 ghcr 는 skipped 되어
  # `result != 'failure'` 는 통과해버림. 그래서 ci.result 도 직접 검사: success/skipped 만 허용.
  # paths-filter 로 변경 없는 쪽은 skipped 되니 success/skipped 양쪽 다 통과시킴.
  production-revision-smoke:
    name: Currently deployed production revision smoke
    runs-on: ubuntu-latest
    needs: [frontend-ci, frontend-ghcr, backend-ci, backend-ghcr]
    if: |
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && always()
      && !cancelled()
      && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped')
      && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped')
      && (needs.frontend-ghcr.result == 'success' || needs.frontend-ghcr.result == 'skipped')
      && (needs.backend-ghcr.result == 'success' || needs.backend-ghcr.result == 'skipped')
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BASE_URL: https://jen.lemuel.co.kr
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npm run e2e:install

      # ArgoCD가 Git의 plain Directory manifest를 reconcile할 시간만 제공한다.
      # 새 이미지 promotion 여부를 보장하지 않으며, 현재 배포 revision을 대상으로 한다.
      - name: Wait for ArgoCD manifest reconciliation
        run: sleep 180

      - name: Run Playwright E2E against jen.lemuel.co.kr
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
