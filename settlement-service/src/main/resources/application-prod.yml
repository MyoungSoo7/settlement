# 운영(prod) 프로파일 — SPRING_PROFILES_ACTIVE=prod 로 활성.
#
# 기본(로컬/개발) 프로파일은 내부 API 키 미설정 시 fail-open(경고 후 통과)으로 개발 편의를 보존하지만,
# 운영에서는 이 플래그를 고정해 fail-closed 로 전환한다: INTERNAL_API_KEY 가 주입되지 않으면
# /internal/** 호출을 통과가 아니라 401 로 거부한다(InternalApiKeyFilter). 키 누락으로 내부 대사
# 엔드포인트가 무방비 노출되는 사고를 배포 프로파일 차원에서 원천 차단한다.
app:
  security:
    internal-key-required: true
