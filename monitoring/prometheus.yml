global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'lemuel-prod'
    replica: '1'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - 'alert-rules.yml'

# Scrape configurations
scrape_configs:
  # Lemuel Spring Boot Application (order-service) — compose 서비스명 order-service:8080
  - job_name: 'lemuel'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8080']
        labels:
          application: 'lemuel'
          environment: 'production'

  # settlement-service (ADR 0020 Phase 4 독립 배포) — 프로젝션 lag/throughput/rows 등 노출
  # compose 서비스명 settlement-service:8080. job 라벨 'lemuel' 유지로 기존 알림식과 호환.
  - job_name: 'lemuel-settlement'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['settlement-service:8080']
        labels:
          job: 'lemuel'
          application: 'lemuel-settlement'
          environment: 'production'

  # kafka-exporter — Redpanda 컨슈머 그룹 lag/오프셋 (브로커 관점, 파티션별).
  # actuator 의 client-side lag 과 달리 모든 그룹·토픽·파티션의 정확한 lag 을 노출. Grafana lag 대시보드 소스.
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
