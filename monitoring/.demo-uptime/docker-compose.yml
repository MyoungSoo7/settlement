# uptime 대시보드 로컬 실증용 임시 스택 (커밋하지 않음).
# 호스트 :8080 의 actuator/prometheus 를 scrape → Grafana 가 provisioning 으로 대시보드 자동 로드.
services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: demo-uptime-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./demo-fast-rules.yml:/etc/prometheus/demo-fast-rules.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: demo-uptime-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3009:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
