groups:
  - name: lemuel_batch_alerts
    interval: 30s
    rules:
      # 배치 실패 알림
      - alert: SettlementBatchFailure
        expr: rate(batch_failures_total{job="lemuel"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: settlement-batch
        annotations:
          summary: "정산 배치 작업 실패 발생"
          description: "최근 5분간 {{ $value | humanizePercentage }} 비율로 배치 실패가 발생했습니다. job={{ $labels.job }}, batch_type={{ $labels.batch_type }}"
          runbook_url: "https://github.com/MyoungSoo7/settlement/wiki/Settlement‐Batch‐Failure-Runbook"

      # 배치 처리 시간 지연
      - alert: SettlementBatchSlowProcessing
        expr: histogram_quantile(0.95, rate(settlement_creation_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
          component: settlement-batch
        annotations:
          summary: "정산 생성 배치 처리 시간 지연"
          description: "정산 생성 배치의 95 percentile 처리 시간이 {{ $value }}초로 60초를 초과했습니다."
          runbook_url: "https://github.com/MyoungSoo7/settlement/wiki/Settlement‐Batch‐Failure-Runbook"

      - alert: SettlementConfirmationSlowProcessing
        expr: histogram_quantile(0.95, rate(settlement_confirmation_duration_seconds_bucket[5m])) > 120
        for: 5m
        labels:
          severity: warning
          component: settlement-batch
        annotations:
          summary: "정산 확정 배치 처리 시간 지연"
          description: "정산 확정 배치의 95 percentile 처리 시간이 {{ $value }}초로 120초를 초과했습니다."

      # 배치 작업 미실행 (하루 이상 실행되지 않음)
      - alert: SettlementBatchNotRunning
        expr: time() - settlement_batch_last_run_timestamp_seconds > 86400
        for: 1h
        labels:
          severity: critical
          component: settlement-batch
        annotations:
          summary: "정산 배치 작업이 24시간 이상 실행되지 않음"
          description: "마지막 배치 실행 후 {{ $value | humanizeDuration }}가 경과했습니다. 스케줄러 또는 애플리케이션 상태를 확인하세요."

  - name: lemuel_refund_alerts
    interval: 30s
    rules:
      # 환불 실패율 높음 (5분간 10% 이상 실패)
      - alert: HighRefundFailureRate
        expr: |
          (
            rate(refund_failed_total{job="lemuel"}[5m])
            /
            rate(refund_requests_total{job="lemuel"}[5m])
          ) > 0.1
        for: 3m
        labels:
          severity: critical
          component: refund
        annotations:
          summary: "환불 실패율 높음"
          description: "최근 5분간 환불 실패율이 {{ $value | humanizePercentage }}로 10%를 초과했습니다."
          runbook_url: "https://github.com/MyoungSoo7/lemuel/wiki/Refund-Failure-Rate"

      # 환불 요청 급증 (평소 대비 5배 이상)
      - alert: RefundRequestSpike
        expr: |
          rate(refund_requests_total{job="lemuel"}[5m])
          >
          5 * avg_over_time(rate(refund_requests_total{job="lemuel"}[5m])[1h:5m])
        for: 5m
        labels:
          severity: warning
          component: refund
        annotations:
          summary: "환불 요청 급증 감지"
          description: "현재 환불 요청률이 평소 대비 5배 이상 증가했습니다. 현재: {{ $value | humanize }}/sec"

      # 환불 처리 시간 지연
      - alert: RefundProcessingSlow
        expr: histogram_quantile(0.95, rate(refund_processing_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: refund
        annotations:
          summary: "환불 처리 시간 지연"
          description: "환불 처리의 95 percentile 시간이 {{ $value }}초로 5초를 초과했습니다."

      # Idempotency Key 재사용 급증
      - alert: HighIdempotencyKeyReuse
        expr: rate(idempotency_key_reuse_total{job="lemuel"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: refund
        annotations:
          summary: "Idempotency Key 재사용 빈도 높음"
          description: "최근 5분간 초당 {{ $value | humanize }}건의 중복 요청이 발생하고 있습니다. 클라이언트 재시도 로직을 확인하세요."

  - name: lemuel_settlement_adjustment_alerts
    interval: 30s
    rules:
      # 미확정 Adjustment 누적
      - alert: PendingSettlementAdjustmentBacklog
        expr: count(settlement_adjustment_status{status="PENDING"} > 0) > 100
        for: 1h
        labels:
          severity: warning
          component: settlement-adjustment
        annotations:
          summary: "미확정 정산 조정 건수 누적"
          description: "PENDING 상태의 정산 조정이 {{ $value }}건으로 100건을 초과했습니다."

      # Adjustment 확정 실패
      - alert: AdjustmentConfirmationFailure
        expr: rate(batch_failures_total{batch_type="adjustment_confirmation"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
          component: settlement-adjustment
        annotations:
          summary: "정산 조정 확정 배치 실패"
          description: "정산 조정 확정 배치에서 실패가 발생했습니다."

  - name: lemuel_health_alerts
    interval: 30s
    rules:
      # 헬스 체크 실패
      - alert: ApplicationHealthDown
        expr: up{job="lemuel"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "애플리케이션 다운"
          description: "Lemuel 애플리케이션이 응답하지 않습니다. instance={{ $labels.instance }}"

      # Custom Health Indicator - 배치 상태 불량
      - alert: SettlementBatchHealthWarning
        expr: health_status{component="settlementBatch"} == 0
        for: 5m
        labels:
          severity: warning
          component: settlement-batch
        annotations:
          summary: "정산 배치 헬스 체크 경고"
          description: "정산 배치 헬스 체크가 WARNING 상태입니다. PENDING 건수를 확인하세요."

  - name: lemuel_performance_alerts
    interval: 1m
    rules:
      # JVM 메모리 사용률 높음
      - alert: HighJVMMemoryUsage
        expr: |
          (
            jvm_memory_used_bytes{job="lemuel", area="heap"}
            /
            jvm_memory_max_bytes{job="lemuel", area="heap"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          component: jvm
        annotations:
          summary: "JVM Heap 메모리 사용률 높음"
          description: "Heap 메모리 사용률이 {{ $value | humanizePercentage }}로 85%를 초과했습니다."

      # DB 커넥션 풀 고갈 임박
      - alert: DatabaseConnectionPoolNearExhaustion
        expr: |
          (
            hikaricp_connections_active{pool="HikariPool-1"}
            /
            hikaricp_connections_max{pool="HikariPool-1"}
          ) > 0.8
        for: 3m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "DB 커넥션 풀 고갈 임박"
          description: "DB 커넥션 사용률이 {{ $value | humanizePercentage }}로 80%를 초과했습니다."

  - name: lemuel_outbox_alerts
    interval: 30s
    rules:
      # Outbox PENDING 적체 — 폴러 이슈나 외부 시스템 장애 신호
      - alert: OutboxPendingBacklog
        expr: outbox_pending_count > 1000
        for: 5m
        labels:
          severity: warning
          component: outbox
        annotations:
          summary: "Outbox PENDING 적체"
          description: "outbox_events 테이블 PENDING 건수가 {{ $value }}건으로 1000을 초과했습니다. OutboxPublisherScheduler 또는 외부 발행 경로를 확인하세요."

      - alert: OutboxPendingCritical
        expr: outbox_pending_count > 10000
        for: 2m
        labels:
          severity: critical
          component: outbox
        annotations:
          summary: "Outbox 심각한 적체 — 이벤트 유실 위험"
          description: "outbox_events PENDING 건수가 {{ $value }}건. 발행 파이프라인 완전 정지 가능성. 즉시 대응."

      # Outbox 발행 지연 — p95 초과
      - alert: OutboxPublishSlow
        expr: histogram_quantile(0.95, rate(outbox_publish_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: outbox
        annotations:
          summary: "Outbox 발행 p95 지연 > 2s"
          description: "단일 outbox 이벤트 외부 발행 p95 가 {{ $value }}초. 네트워크 또는 외부 시스템 응답 확인."

  - name: lemuel_cashflow_report_alerts
    interval: 30s
    rules:
      # Cashflow 리포트 대사 불일치 — 금액 원장 정합성 위반
      # 어떤 check (payments/adjustments/outbox) 가 실패해도 1시간 내 1건 이상 집계되면 critical
      - alert: CashflowReconciliationMismatch
        expr: increase(cashflow_reconciliation_mismatch_total[1h]) > 0
        for: 2m
        labels:
          severity: critical
          component: cashflow-report
        annotations:
          summary: "Cashflow 대사 불일치 ({{ $labels.check }})"
          description: |
            최근 1시간 내 cashflow 리포트 대사에서 {{ $labels.check }} 불변식이 {{ $value }}건 실패했습니다.
            실패한 check:
              - payments_minus_refunds_equals_settlement → 결제·환불·정산 금액 불일치 (금액 유실 가능성)
              - adjustments_equal_linked_refunds → 조정·환불 원장 연결 끊김
              - outbox_published_equals_settlements_created → 이벤트-정산 파이프라인 drop
            즉시 /api/reports/cashflow 로 조회해 mismatches[].detail 확인.

      # 리포트 생성 지연 — 재무 마감 시 적시성 확보
      - alert: CashflowReportGenerationSlow
        expr: histogram_quantile(0.95, rate(cashflow_report_generation_duration_seconds_bucket[5m])) > 3
        for: 10m
        labels:
          severity: warning
          component: cashflow-report
        annotations:
          summary: "Cashflow 리포트 p95 생성 지연 > 3s"
          description: "최근 5분 p95 생성 시간이 {{ $value }}초. DB 인덱스, 집계 쿼리, JDBC 커넥션 상태 확인."

      # 특정 check 가 반복적으로 실패 — 원인 제거 전 지속 감시
      - alert: CashflowReconciliationPersistentFailure
        expr: increase(cashflow_reconciliation_mismatch_total[6h]) > 10
        for: 5m
        labels:
          severity: critical
          component: cashflow-report
        annotations:
          summary: "Cashflow 대사 지속 실패 ({{ $labels.check }})"
          description: "{{ $labels.check }} 불변식이 6시간 내 {{ $value }}회 실패. 근본 원인 미해결 상태. 데이터 복구 및 원인 분석 필요."

  # ──────────────────────────────────────────────────────────────────────
  # Kafka DLT (Dead Letter Topic) — 정산 시작점 이벤트 처리 실패 감시
  # 메트릭은 settlement-service KafkaErrorHandlerConfig 가 노출.
  # 자세한 설계는 ADR 0017 참조.
  # ──────────────────────────────────────────────────────────────────────
  - name: lemuel_kafka_dlt_alerts
    interval: 30s
    rules:
      # DLT publish 발생 — 정산 시작점 이벤트가 처리 실패한 것 — 즉시 운영자 호출
      # 임계 0.1/s = 5 분 평균 30 건 이상 DLT 라우팅. 정상 운영에서는 0 이어야 함.
      - alert: SettlementKafkaDltPublishedSpike
        expr: rate(settlement_kafka_dlt_published_total{job="lemuel"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          component: kafka-consumer
        annotations:
          summary: "Kafka 컨슈머 DLT 라우팅 빈도 임계 초과"
          description: |
            최근 5 분간 settlement-service 가 초당 {{ $value | humanize }} 건의 메시지를 DLT 로 라우팅 중.
            가능한 원인:
              - 페이로드 스키마 변경 (producer-consumer drift)
              - 도메인 검증 실패 (정산 인풋 무효)
              - 컨슈머 버그
            대응:
              1. GET /admin/dlq/inspect?topic=lemuel.payment.captured.DLT&max=20 — 페이로드/예외 확인
              2. 페이로드 패치 또는 컨슈머 핫픽스
              3. POST /admin/dlq/replay 로 재처리
            ADR 0017 참조.

      # DLT 단 한 건이라도 발생 — 정상이 0 이어야 하는 환경에서는 즉시 알림 (개발/스테이징 권장)
      - alert: SettlementKafkaDltAnyMessage
        expr: increase(settlement_kafka_dlt_published_total{job="lemuel"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
          component: kafka-consumer
        annotations:
          summary: "Kafka DLT 메시지 발생 (정상 운영에선 0)"
          description: "최근 10 분간 {{ $value }} 건이 DLT 로 라우팅됨. 운영자가 inspect/replay 결정 필요."

      # 재시도 빈발 = 백엔드 (DB·외부 API) 불안 신호
      # 정상 운영에선 transient 거의 없으므로 재시도가 잦으면 인프라 점검 신호
      - alert: SettlementKafkaRetrySpike
        expr: rate(settlement_kafka_retry_total{job="lemuel"}[5m]) > 1
        for: 5m
        labels:
          severity: warning
          component: kafka-consumer
        annotations:
          summary: "Kafka 컨슈머 재시도 빈도 임계 초과 — 백엔드 불안 가능성"
          description: |
            settlement-service Kafka 컨슈머 재시도가 초당 {{ $value | humanize }} 건. 6 초 backoff 가 SLA 잠식.
            점검 항목:
              - DB 락 / 커넥션 풀 (HikariCP)
              - 외부 의존성 응답시간
              - 컨슈머 트랜잭션 시간

      # Replay 행위 감시 — 운영자가 실수로 폭주시키지 않는지 확인
      # 5 분 내 100 건 이상 replay = 무한루프 또는 운영자 실수 가능성
      - alert: SettlementKafkaDltReplaySurge
        expr: increase(settlement_kafka_dlt_replayed_total{job="lemuel"}[5m]) > 100
        for: 1m
        labels:
          severity: warning
          component: kafka-consumer
        annotations:
          summary: "DLT replay 폭주 — 운영자 실수 또는 무한루프 의심"
          description: |
            최근 5 분 내 {{ $value }} 건 replay. x-replay-count 5 회 cap 이 작동 중인지 확인.
            audit_logs 에서 operator 추적 필요.

  # ──────────────────────────────────────────────────────────────────────
  # Settlement 로컬 프로젝션 (CQRS read model) — ADR 0020 Phase 5.6
  # order 이벤트가 settlement_db 프로젝션에 반영되는 지연/처리량 감시.
  # DB 물리 분리(Phase 4) 후 eventual consistency 의 lag 를 운영에서 관측.
  # 메트릭: SettlementProjectionMetrics / SettlementProjectionGauges 노출.
  # ──────────────────────────────────────────────────────────────────────
  - name: lemuel_settlement_projection_alerts
    interval: 30s
    rules:
      # 프로젝션 반영 지연 p95 > 30s — 복제 지연 경고
      - alert: SettlementProjectionLagHigh
        expr: histogram_quantile(0.95, sum by (le, type) (rate(settlement_projection_lag_seconds_bucket[5m]))) > 30
        for: 5m
        labels:
          severity: warning
          component: settlement-projection
        annotations:
          summary: "settlement 프로젝션 반영 지연 p95 > 30s ({{ $labels.type }})"
          description: |
            {{ $labels.type }} 프로젝션의 발행→반영 p95 지연이 {{ $value }}초입니다.
            조회/리포팅이 stale 데이터를 볼 수 있습니다. 점검:
              - 컨슈머 그룹(lemuel-settlement) lag / 컨슈머 정지 여부
              - settlement_db 부하 (HikariCP, 슬로우 쿼리)
              - redpanda 파티션 적체

      # 프로젝션 반영 지연 p95 > 120s — 심각 (컷오버/대사 정합성 위협)
      - alert: SettlementProjectionLagCritical
        expr: histogram_quantile(0.95, sum by (le, type) (rate(settlement_projection_lag_seconds_bucket[5m]))) > 120
        for: 3m
        labels:
          severity: critical
          component: settlement-projection
        annotations:
          summary: "settlement 프로젝션 반영 지연 심각 ({{ $labels.type }})"
          description: |
            {{ $labels.type }} p95 지연 {{ $value }}초 — 프로젝션이 사실상 정지 가능성.
            정산 생성은 이벤트 동봉 데이터로 계속되나 조회 read model 이 크게 뒤처짐.
            즉시 컨슈머/DB/브로커 상태 확인. runbook: docs/runbook/settlement-projection-lag.md

      # 프로젝션 반영 정지 — 처리량 0 이 지속 (유휴와 구분하려 for 길게)
      - alert: SettlementProjectionStalled
        expr: sum(rate(settlement_projection_applied_total[10m])) == 0
        for: 30m
        labels:
          severity: warning
          component: settlement-projection
        annotations:
          summary: "settlement 프로젝션 반영이 30분간 없음"
          description: |
            최근 10분 처리율이 0 이며 30분 지속. 트래픽이 없는 유휴 구간일 수도 있으나,
            컨슈머 정지/구독 해제 가능성도 있으니 lemuel-settlement 컨슈머 상태를 확인하세요.

      # cross-DB 대사(Phase 5.2): opslab 원천 vs settlement_db 프로젝션 행 수 드리프트.
      # order(settlement_recon_source_rows) - settlement(settlement_projection_rows), view 라벨로 매칭.
      # 짧은 복제 lag 은 정상이므로 임계(>10건) + 지속(15m)으로 노이즈 억제.
      - alert: SettlementProjectionDriftHigh
        expr: |
          (
            max by (view) (settlement_recon_source_rows)
            - max by (view) (settlement_projection_rows)
          ) > 10
        for: 15m
        labels:
          severity: warning
          component: settlement-projection
        annotations:
          summary: "settlement 프로젝션 행 수 드리프트 ({{ $labels.view }})"
          description: |
            opslab 원천이 settlement_db 프로젝션({{ $labels.view }})보다 {{ $value }}건 많은 상태가
            15분 지속됐습니다. 단순 복제 lag 을 넘어선 프로젝션 누락 가능성.
            점검: lemuel-settlement 컨슈머 lag / DLT 적체.
            자가치유: POST /admin/settlement-projection/backfill (멱등 이벤트 재발행).
            runbook: docs/runbook/settlement-projection-lag.md

      # 드리프트 지속 — 자가치유(백필) 후에도 1시간 이상 수렴하지 않으면 심각
      - alert: SettlementProjectionDriftPersistent
        expr: |
          (
            max by (view) (settlement_recon_source_rows)
            - max by (view) (settlement_projection_rows)
          ) > 10
        for: 1h
        labels:
          severity: critical
          component: settlement-projection
        annotations:
          summary: "settlement 프로젝션 드리프트 미수렴 ({{ $labels.view }})"
          description: |
            {{ $labels.view }} 드리프트 {{ $value }}건이 1시간 지속 — 백필로도 수렴 안 됨.
            이벤트 파이프라인(Outbox→Kafka→컨슈머) 단절 또는 토픽/스키마 드리프트 의심.
            ADR 0020 / DLT inspect 로 근본 원인 분석 필요.
