apiVersion: v1
kind: PersistentVolume
metadata:
  name: operation-db-pv
  labels:
    type: local
    app: operation-db
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  # Single-node only: hostPath binds data to one node and is not portable across rescheduling nodes.
  hostPath:
    path: /data/k8s/operation-db
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: operation-db-pvc
  namespace: lemuel
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  selector:
    matchLabels:
      app: operation-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: operation-db
  namespace: lemuel
spec:
  serviceName: operation-db-service
  replicas: 1
  selector:
    matchLabels:
      app: operation-db
  template:
    metadata:
      labels:
        app: operation-db
    spec:
      containers:
        - name: operation-db
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: lemuel_operation
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lemuel-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lemuel-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: operation-db-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: operation-db-storage
          persistentVolumeClaim:
            claimName: operation-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: operation-db-service
  namespace: lemuel
spec:
  clusterIP: None
  selector:
    app: operation-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
