# ============================================================
# settlement-db-pv.yaml
# ADR 0020 Phase 4 — settlement-service 전용 PostgreSQL (opslab 와 물리 분리).
# postgresql-pv.yaml(opslab) 패턴을 복제한 DB-per-service 인스턴스.
#
# 포함 리소스: PV → PVC → StatefulSet → (Headless) Service
# 접근 주소: settlement-db-service.lemuel.svc.cluster.local:5432
#
# 사전 준비 (우분투 서버): sudo mkdir -p /data/k8s/settlement-db
# ============================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: settlement-db-pv
  labels:
    type: local
    app: settlement-db
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/data/k8s/settlement-db"
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: settlement-db-pvc
  namespace: lemuel
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  selector:
    matchLabels:
      app: settlement-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: settlement-db
  namespace: lemuel
spec:
  serviceName: "settlement-db-service"
  replicas: 1
  selector:
    matchLabels:
      app: settlement-db
  template:
    metadata:
      labels:
        app: settlement-db
    spec:
      containers:
        - name: settlement-db
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "settlement_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lemuel-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lemuel-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: settlement-db-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["sh","-c","pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh","-c","pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: settlement-db-storage
          persistentVolumeClaim:
            claimName: settlement-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: settlement-db-service
  namespace: lemuel
spec:
  clusterIP: None
  selector:
    app: settlement-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
