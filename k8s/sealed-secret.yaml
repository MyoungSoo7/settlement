apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lemuel-secret
  namespace: lemuel
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # 아래 값들은 kubeseal 명령어로 생성한 암호화된 값으로 교체하세요.
    # 생성 방법: echo -n "실제값" | kubeseal --raw --from-file=/dev/stdin --namespace lemuel --name lemuel-secret
    POSTGRES_USER:
    POSTGRES_PASSWORD:
    ELASTICSEARCH_USER:
    ELASTICSEARCH_PASSWORD:
    JWT_SECRET:
    SLACK_WEBHOOK_URL:
    SLACK_CHANNEL:
  template:
    metadata:
      name: lemuel-secret
      namespace: lemuel
    type: Opaque
