# ============================================================
# sealed-secret.yaml
# 역할: 비밀번호·토큰 등 민감한 값을 암호화해서 Git에 안전하게 저장한다.
#
# 일반 Secret은 base64 인코딩에 불과해 Git에 올리면 안 된다.
# SealedSecret은 클러스터의 공개키로 암호화하기 때문에
# 해당 클러스터에서만 복호화 가능 → Git 커밋 가능.
#
# 동작 방식:
#   1. 클러스터에 Sealed Secrets 컨트롤러(bitnami)가 설치되어 있어야 함
#   2. kubeseal 명령어로 값을 암호화해 이 파일의 encryptedData에 채운다
#   3. kubectl apply 하면 컨트롤러가 복호화해 실제 Secret(lemuel-secret)을 생성
#   4. Deployment/StatefulSet 등에서 secretRef 또는 secretKeyRef로 참조
#
# 암호화 방법:
#   echo -n "실제값" | kubeseal --raw --from-file=/dev/stdin \
#     --namespace lemuel --name lemuel-secret
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lemuel-secret
  namespace: lemuel
  annotations:
    # cluster-wide: false → 이 namespace(lemuel)에서만 복호화 가능
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # 아래 빈 값들을 kubeseal로 암호화한 문자열로 교체하세요.
    POSTGRES_USER:
    POSTGRES_PASSWORD:
    ELASTICSEARCH_USER:
    ELASTICSEARCH_PASSWORD:
    JWT_SECRET:
    SLACK_WEBHOOK_URL:
    SLACK_CHANNEL:
  template:
    metadata:
      name: lemuel-secret      # 생성될 실제 Secret 이름
      namespace: lemuel
    type: Opaque