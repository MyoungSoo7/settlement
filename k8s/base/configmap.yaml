# ============================================================
# configmap.yaml
# 역할: 민감하지 않은 환경변수(설정값)를 저장한다.
#
# ConfigMap은 비밀이 아닌 설정값(DB 호스트명, 포트, 프로파일 등)을
# 코드나 이미지와 분리해서 관리하는 오브젝트다.
# 민감한 값(비밀번호, 토큰)은 sealed-secret.yaml에서 관리한다.
#
# Pod에서는 envFrom.configMapRef 로 참조해 환경변수로 주입된다.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: lemuel-config
  namespace: lemuel
data:
  # Spring 실행 프로파일 (application-production.yml 을 로드)
  SPRING_PROFILES_ACTIVE: "production"
  ENVIRONMENT: "production"

  # PostgreSQL 접속 정보 (호스트명은 Service 이름과 일치해야 함)
  POSTGRES_HOST: "postgresql-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "opslab"

  # Elasticsearch 접속 정보 (호스트명은 Service 이름과 일치해야 함)
  ELASTICSEARCH_HOST: "elasticsearch-service"
  ELASTICSEARCH_PORT: "9200"

  # JWT 설정 (시크릿 키는 sealed-secret.yaml에서 주입)
  JWT_ISSUER: "lemuel-service"
  JWT_TTL_SECONDS: "86400"