# ============================================================
# settlement-configmap.yaml
# settlement-service(독립 배포) 전용 비밀-아닌 설정. (ADR 0020 Phase 4)
# 비밀(POSTGRES_USER/PASSWORD, JWT_SECRET, ELASTICSEARCH_PASSWORD)은
# lemuel-secret(SealedSecret) 재사용.
#
# 전제: settlement-service 는 자체 DB(settlement_db)를 사용한다 (DB-per-service).
#   storage/settlement-db-pv.yaml 가 settlement-db-service 를 프로비저닝한다.
#   최초 이관은 docs/runbook/settlement-db-cutover.md 참조.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: settlement-config
  namespace: lemuel
data:
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"
  MANAGEMENT_SERVER_PORT: "8080"

  # 자체 DB — opslab 와 물리 분리. 교차 FK 없음. 자체 Flyway 가 스키마 생성.
  SPRING_DATASOURCE_URL: "jdbc:postgresql://settlement-db-service:5432/settlement_db?reWriteBatchedInserts=true"

  # Elasticsearch — 정산 검색 색인
  SPRING_ELASTICSEARCH_URIS: "http://elasticsearch-service:9200"
  APP_SEARCH_ENABLED: "true"

  # Kafka (redpanda) — order 도메인 이벤트 consume → 로컬 projection 적재
  APP_KAFKA_ENABLED: "true"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "redpanda:29092"

  # JWT — order-service 와 동일 시크릿(lemuel-secret)이어야 토큰 검증 가능
  JWT_ISSUER: "lemuel-service"
  JWT_TTL_SECONDS: "86400"
