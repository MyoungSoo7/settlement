# ============================================================
# kafka.yaml — Redpanda (Kafka API 호환) 단일 노드 배포
#
# 개발/데모 용도의 단일 브로커 설정. 프로덕션은 Strimzi 또는 Redpanda Operator
# 로 3 브로커 + 3 복제 구성으로 교체할 것.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: lemuel
  labels:
    app: redpanda
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: kafka-internal
      port: 29092
      targetPort: 29092
  selector:
    app: redpanda
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: lemuel
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --smp
            - "1"
            - --overprovisioned
            - --node-id
            - "0"
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://redpanda:29092,OUTSIDE://redpanda.lemuel.svc.cluster.local:9092
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - redpanda:33145
          ports:
            - name: kafka
              containerPort: 9092
            - name: kafka-internal
              containerPort: 29092
            - name: rpc
              containerPort: 33145
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health", "--exit-when-healthy"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
