# ============================================================
# service.yaml
# 역할: 백엔드(Spring Boot) Pod를 외부 및 Ingress에서 접근할 수 있도록 노출한다.
#
# Service는 여러 Pod를 하나의 안정된 주소로 묶어주는 로드밸런서다.
# Pod는 재시작될 때마다 IP가 바뀌지만, Service IP는 고정이다.
#
# NodePort 방식: 클러스터 외부에서 <서버IP>:30080 으로 직접 접근 가능.
# Ingress와 함께 사용할 경우, Ingress → lemuel-service:8080 → Pod 순으로 라우팅.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: lemuel-service
  namespace: lemuel
  labels:
    app: lemuel
spec:
  # NodePort: 우분투 단일 노드에서 외부 직접 접근용 (30080 포트 개방)
  # Ingress만 사용한다면 ClusterIP로 변경해도 무방
  type: NodePort
  selector:
    app: lemuel        # 이 라벨을 가진 Pod(lemuel-app)에게 트래픽 전달
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080        # Service 내부 포트 (Ingress → Service 연결 시 이 포트 사용)
      targetPort: 8080  # Pod의 실제 포트
      nodePort: 30080   # 외부 접근 포트: <서버IP>:30080 으로 직접 접근 가능
  # 같은 클라이언트 IP는 같은 Pod로 연결 (세션 유지)
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3시간 세션 유지