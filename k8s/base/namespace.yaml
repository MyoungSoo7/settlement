# ============================================================
# namespace.yaml
# 역할: 이 프로젝트 전용 격리 공간(Namespace)을 생성한다.
#
# Kubernetes는 하나의 클러스터에서 여러 프로젝트를 운영할 수 있다.
# Namespace를 사용하면 리소스를 논리적으로 분리해
# 다른 프로젝트와 이름 충돌 없이 관리할 수 있다.
#
# 모든 k8s 리소스(Deployment, Service 등)는 이 namespace: lemuel 안에 생성된다.
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: lemuel
  labels:
    name: lemuel
    environment: production