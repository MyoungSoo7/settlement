# ============================================================
# settlement-deployment.yaml
# settlement-service(정산/지급/원장/차지백/PG대사) 독립 배포. (ADR 0020 Phase 4)
# 자체 이미지(MODULE=settlement-service)·자체 DB(settlement_db)·자체 Pod.
#   - ConfigMap: settlement-config
#   - Secret:    lemuel-secret (POSTGRES_USER/PASSWORD, JWT_SECRET, ELASTICSEARCH_PASSWORD 재사용)
#   - Service:   settlement-service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-app
  namespace: lemuel
  labels:
    app: settlement
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: settlement
      tier: backend
  template:
    metadata:
      labels:
        app: settlement
        tier: backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: settlement
          image: ghcr.io/myoungsoo7/settlement-settlement:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: lemuel-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
