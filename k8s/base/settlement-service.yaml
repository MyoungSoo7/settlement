# ============================================================
# settlement-service.yaml
# settlement-app Pod 를 클러스터 내부에 노출한다. (ADR 0020 Phase 4)
# 외부 트래픽은 gateway 가 /settlements/**, /api/settlements/**, /admin/payouts/**,
# /admin/chargebacks/**, /api/ledger/**, /api/reports/**, /admin/reconciliation/**
# 등을 이 Service 로 라우팅하므로 ClusterIP 로 충분.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: settlement-service
  namespace: lemuel
  labels:
    app: settlement
spec:
  type: ClusterIP
  selector:
    app: settlement
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
