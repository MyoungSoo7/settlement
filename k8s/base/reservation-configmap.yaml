# ============================================================
# reservation-configmap.yaml
# reservation-service(독립 배포) 전용 비밀-아닌 설정.
# 비밀(POSTGRES_USER/PASSWORD, JWT_SECRET)은 lemuel-secret(SealedSecret) 재사용.
#
# 전제: reservation-service 는 자체 DB(reservations_db)를 사용한다 (DB-per-service).
#   별도 PostgreSQL(reservations-postgresql-service)을 프로비저닝해야 한다
#   (storage/postgresql-pv.yaml 패턴을 복제하거나 관리형 DB 사용).
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: reservation-config
  namespace: lemuel
data:
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"
  MANAGEMENT_SERVER_PORT: "8080"

  # 자체 DB — opslab 와 물리 분리. 교차 FK 없음.
  RESERVATION_DATASOURCE_URL: "jdbc:postgresql://reservations-postgresql-service:5432/reservations_db?reWriteBatchedInserts=true"

  # Kafka (redpanda) — user 멤버십 이벤트 consume
  APP_KAFKA_ENABLED: "true"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "redpanda:29092"

  # JWT — order-service 와 동일 시크릿(lemuel-secret)이어야 토큰 검증 가능
  JWT_ISSUER: "lemuel-service"
  JWT_TTL_SECONDS: "86400"
