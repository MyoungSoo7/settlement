# ============================================================
# reservation-service.yaml
# reservation-app Pod 를 클러스터 내부에 노출한다.
# 외부 트래픽은 gateway 가 /reservations/** 를 이 Service 로 라우팅하므로 ClusterIP 로 충분.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: lemuel
  labels:
    app: reservation
spec:
  type: ClusterIP
  selector:
    app: reservation
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
