# ============================================================
# reservation-deployment.yaml
# reservation-service(시공 예약/기사 배정) 독립 배포.
# 자체 이미지(MODULE=reservation-service)·자체 DB·자체 Pod.
#   - ConfigMap: reservation-config
#   - Secret:    lemuel-secret (POSTGRES_USER/PASSWORD, JWT_SECRET 재사용)
#   - Service:   reservation-service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-app
  namespace: lemuel
  labels:
    app: reservation
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: reservation
      tier: backend
  template:
    metadata:
      labels:
        app: reservation
        tier: backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: reservation
          image: ghcr.io/myoungsoo7/settlement-reservation:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: reservation-config
            - secretRef:
                name: lemuel-secret
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
