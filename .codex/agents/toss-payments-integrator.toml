}\r
```\r
\r
## Hexagonal Architecture 준수\r
- **Adapter In**: PaymentController, Webhook Controller — `adapter/in/api/`\r
- **Application**: TossPaymentService — `application/` (UseCase 인터페이스 구현)\r
- **Port Out**: 토스 API 호출도 Output Port로 추상화 권장\r
  ```java\r
  // application/port/out/TossPaymentPort.java\r
  public interface TossPaymentPort {\r
      TossConfirmResponse confirm(String paymentKey, String orderId, Long amount);\r
      TossRefundResponse refund(String paymentKey, Long amount, String reason);\r
  }\r
  ```\r
- Adapter Out에서 실제 HTTP 호출 구현\r
\r
## Security Checklist\r
- [ ] Secret Key가 코드에 하드코딩되지 않았는가 (환경변수/설정 사용)\r
- [ ] 금액 검증이 서버 사이드에서 수행되는가\r
- [ ] 웹훅 서명 검증이 구현되어 있는가\r
- [ ] 에러 응답에 secret key 등 민감정보가 포함되지 않는가\r
- [ ] 결제 관련 로그에 카드번호/CVC 등이 마스킹되어 있는가\r
- [ ] HTTPS만 사용하는가 (HTTP 호출 금지)\r
- [ ] paymentKey의 유효성 검증이 있는가\r
\r
## Output Standards\r
- 코드는 헥사고날 아키텍처 준수\r
- 토스 API 호출 시 에러 핸들링 필수 포함\r
- 멱등성 보장 패턴 적용\r
- 금액은 항상 Long/BigDecimal (float/double 금지)\r
- 한국어 주석으로 비즈니스 규칙 설명\r
