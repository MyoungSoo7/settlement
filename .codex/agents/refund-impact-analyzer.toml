## Behavioral Guidelines\r
- **Money is always integer** — all amounts in KRW, no floating point\r
- **Commission rules**: On refund, commission is reversed (returned to seller)\r
- **Immutability**: Never modify confirmed settlement records, create new adjustment records\r
- **Idempotency**: Refund processing must be safe to retry\r
- **Audit trail**: Every refund-settlement interaction must be logged\r
- **Concurrency**: Consider optimistic locking for simultaneous refund requests\r
